# Privex Postgres config - no-log, minimal WAL. Expanded in Session 7.
# UNLOGGED tables (message_queue, blob_index, kt_log, ...) keep user data out
# of the WAL; these settings reinforce that.

listen_addresses = '*'

# WAL / durability - minimal footprint, no archiving.
# BASELINE durability is the nightly encrypted logical backup (infra/scripts/
# backup.sh) of the account-critical LOGGED tables. That is enough to satisfy
# PVX-01 on a single node and keeps the WAL tiny.
wal_level = minimal
archive_mode = off
max_wal_senders = 0
max_wal_size = 64MB
checkpoint_timeout = 5min

# --- OPTIONAL: streaming replication + PITR (opt-in, deploy decision) ---
# For a hot standby and point-in-time recovery, a deploy session flips these on
# and stands up a replica. The WAL then holds only ciphertext + pseudonymous
# px_ids for the LOGGED tables (the UNLOGGED tables never touch the WAL), so this
# does NOT violate the Four Laws - same argument as migration 0012's rationale.
# Do NOT enable without an actual standby consuming the WAL, or it just grows.
#   wal_level = replica
#   archive_mode = on
#   archive_command = '...ship WAL to encrypted off-host store...'
#   max_wal_senders = 3
#   wal_keep_size = 512MB

# Logging - off. No statements, no connections.
log_statement = none
log_connections = off
log_disconnections = off
log_duration = off
