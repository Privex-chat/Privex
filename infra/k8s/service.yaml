apiVersion: v1
kind: Service
metadata:
  name: privex-server
  namespace: privex
  labels:
    app.kubernetes.io/name: privex-server
spec:
  type: ClusterIP # public exposure is via the ingress/edge proxy, not this Service
  selector:
    app.kubernetes.io/name: privex-server
  ports:
    - name: http
      port: 8080
      targetPort: http
