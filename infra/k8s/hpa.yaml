apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: privex-server
  namespace: privex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: privex-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # avoid flapping under bursty load
