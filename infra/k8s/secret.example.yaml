apiVersion: v1
kind: Secret
metadata:
  name: privex-secrets
  namespace: privex
type: Opaque
stringData:
  DATABASE_URL: "postgres://privex:REPLACE_ME@postgres.privex.svc.cluster.local:5432/privex"
  REDIS_URL: "redis://redis.privex.svc.cluster.local:6379"
  SESSION_HMAC_KEY: "REPLACE_ME_64_HEX_CHARS"
  KT_SIGNING_KEY: "REPLACE_ME_64_HEX_CHARS"
  TIME_SIGNING_KEY: "REPLACE_ME_64_HEX_CHARS"
  OPAQUE_SERVER_SETUP: "REPLACE_ME_BASE64_SERVERSETUP"
  R2_ACCESS_KEY: "REPLACE_ME"
  R2_SECRET_KEY: "REPLACE_ME"
  TURN_SECRET: "REPLACE_ME"
