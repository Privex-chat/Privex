# Privex reverse proxy (nginx) — §8.4 True No-Log Infrastructure
# Copy to /etc/nginx/sites-available/privex (replaces existing config).
# symlink: ln -sf /etc/nginx/sites-available/privex /etc/nginx/sites-enabled/
server {
    listen 127.0.0.1:8088;
    server_name privex.chat;

    # ── Security headers (docs 9.5) ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self' wss://*.privex.chat; img-src 'self' blob: data:; style-src 'self'; font-src 'self'; worker-src 'self' blob:; manifest-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # Hide server version
    server_tokens off;

    # Disable access logs (§8.4)
    access_log off;

    # ── Announcement banner JSON (editable, no restart needed) ──
    location = /announcement.json {
        alias /home/sonix/Privex/announcement.json;
        add_header Cache-Control "no-cache, must-revalidate" always;
        # Same-origin only: the app fetches this from its own origin, so no CORS
        # header is needed (dropping the wildcard ACAO - PVX-26).
    }

    # ── API routes → Rust backend ──
    location /auth/    { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }
    location /keys/    { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }
    location /recovery/ { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }
    location /messages/ { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }
    location /blobs/   { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }
    location /history/ { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }

    location /config/ { proxy_pass http://127.0.0.1:8888; proxy_set_header Host $host; }

    # Liveness alias + split readiness/liveness probes → real backend (PVX-02).
    location /health {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
    }

    # Aggregate metrics (PVX-04): internal scrape only, never public.
    location = /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
    }

    # WebSocket endpoint
    location /v1/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static frontend (built files from apps/web/dist) ──
    root /home/sonix/Privex/apps/web/dist;
    index index.html;

    # Cache immutable hashed assets forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Don't cache the shell or service worker
    location = / {
        add_header Cache-Control "no-cache" always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }

    # Everything else: SPA fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
