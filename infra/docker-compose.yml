# Privex infrastructure stack — PostgreSQL, Redis, MinIO.
# nginx (host) handles TLS + reverse proxy; no Caddy needed.
# Docker secrets loaded from .env (shared with the host Rust server).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: privex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privex}
      POSTGRES_DB: privex
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6380:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: privex
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-privexprivex}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
