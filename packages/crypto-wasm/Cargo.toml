[package]
name = "privex-crypto-wasm"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.95"
js-sys = "0.3.72"

# Classical primitives (pure Rust, audited - NOT custom crypto)
ed25519-dalek    = { version = "2.1.1", features = ["rand_core", "zeroize"] }
x25519-dalek     = { version = "2.0.1", features = ["static_secrets", "zeroize"] }
# Ristretto255 for PSI/OPRF blinding (Session 6)
curve25519-dalek = { version = "4.1.3", features = ["rand_core", "digest"] }

# Perceptual hash for the CSAM check (Phase 2 utility, wired in Session 6)
pdqhash = "0.1.1"
image   = { version = "0.23.14", default-features = false } # RgbaImage/DynamicImage only

# Post-quantum (NIST FIPS, pure Rust). ML-KEM-1024 = Kyber1024, ML-DSA-65 = Dilithium3.
fips203 = "0.4.3"
fips204 = "0.4.6"

# Recovery: BIP-39 seed phrases + deterministic keygen RNG
bip39       = "2.1.0"
rand_chacha = "0.3.1"

# Recovery: OPAQUE (PAKE) - password-based, zero-knowledge account recovery.
# Argon2id is the key-stretching function (opaque-ke "argon2" feature).
opaque-ke = { version = "3.0.0", features = ["ristretto255", "argon2"] }
argon2    = "0.5.3"
hmac      = "0.12.1"

# AEAD (Double Ratchet message keys + Sealed Sender cert)
aes-gcm          = "0.10.3"
chacha20poly1305 = "0.10.1"

# Session-state serialization (stored in IndexedDB by the caller)
serde   = { version = "1.0.215", features = ["derive"] }
bincode = "1.3.3"

# KDF / hash / RNG / memory hygiene
sha2      = "0.10.8"
hkdf      = "0.12.4"
hex       = "0.4.3"
zeroize   = { version = "1.8.1", features = ["derive"] }
rand_core = { version = "0.6.4", features = ["getrandom"] }
getrandom = { version = "0.2.15", features = ["js"] }

[[bench]]
name = "pow_bench"
harness = false

[profile.release]
opt-level = "s"
lto = true
