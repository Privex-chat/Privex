syntax = "proto3";
package privex;

import "calls.proto";
import "groups.proto";

// Double Ratchet message (docs 4.4). Padding is applied to the plaintext
// before encryption and is not modeled here.
message RatchetMessage {
  uint32 version      = 1;
  bytes  ratchet_key  = 2; // current DH ratchet public key
  uint32 counter      = 3;
  uint32 prev_counter = 4; // for out-of-order delivery
  bytes  ciphertext   = 5; // AES-256-GCM output
  bytes  mac          = 6; // HMAC-SHA256 over header + ciphertext
}

message TextMessage {
  string body                  = 1;
  uint64 sent_at               = 2; // unix seconds
  uint64 expires_after_seconds = 3; // disappearing messages; 0 = off
}

// File manifest (docs 4.7). Sent inside an encrypted message, never uploaded.
message FileMessage {
  bytes  filename_encrypted  = 1;
  bytes  mime_type_encrypted = 2;
  uint64 total_size          = 3;
  bytes  sha256_plaintext    = 4; // integrity check over the plaintext file
  repeated string chunk_ids  = 5; // content-addressed chunk ids (hex SHA-256)
  bytes  wrapped_cek         = 6; // Content Encryption Key wrapped for recipient
  bytes  cek_eph_pub         = 7; // X25519 ephemeral for CEK unwrap
  bytes  thumbnail_encrypted = 8; // optional preview
  uint64 sent_at             = 9;
}

// Silent contact announcement (docs 4.1). Sent automatically when you add someone
// so they auto-add you back - rides Sealed Sender, so the server still learns no
// social graph. Carries no visible message.
message ContactHello {
  uint64 sent_at = 1;
}

// Delivery/read confirmation (docs 4.10). Rides Content exactly like any other
// message — same ratchet, same Sealed Sender, same padding — so the server cannot
// distinguish it. Deliberately carries NO timestamp (timing correlation) and no
// message/conversation reference beyond the random token.
message ReceiptMessage {
  bytes  token_id     = 1; // 32 bytes, matches the sender's ReceiptRequest token
  string receipt_type = 2; // "delivered" | "read"
}

// Attached inside the encrypted payload when the sender wants receipts (docs 4.10).
// token_id is CSPRNG(32) — the server never sees it; only the recipient does after
// decryption. NOTE (deviation from docs wire sketch): no return_address field —
// Sealed Sender already authenticates the sender's px_id, and trusting an inner
// unauthenticated address would let a forger redirect receipts at a third party.
message ReceiptRequest {
  bytes token_id         = 1;
  bool  request_delivery = 2;
  bool  request_read     = 3;
}

// The plaintext payload that gets sealed-sender encrypted. Exactly one type.
message Content {
  oneof body {
    TextMessage    text          = 1;
    FileMessage    file          = 2;
    CallInvite     call_invite   = 3;
    CallAccept     call_accept   = 4;
    IceCandidate   ice           = 5;
    CallHangup     call_hangup   = 6;
    MLSMessage     mls           = 7;
    ContactHello   contact_hello = 8;
    ReceiptMessage receipt       = 9;
  }
  // Set on text/file when the sender requests delivery/read receipts.
  ReceiptRequest receipt_request = 10;
}

// PQXDH initial-handshake fields carried on the FIRST message of a new session so
// the recipient can complete X3DH (docs 4.3). `alice_ik_pub` is the initiator's
// X25519 identity key - also the Sealed-Sender target for replies.
message PqxdhInit {
  bytes  alice_ik_pub     = 1;
  bytes  alice_ek_pub     = 2;
  bytes  kyber_ciphertext = 3;
  bool   opk_used         = 4;
  uint32 opk_id           = 5; // which of the recipient's OPKs was consumed (0 = none)
}

// Cross-device sync copy (docs 4.11 Mode C). A message SENT from one of the
// user's linked devices, re-encrypted (AES-256-GCM under the pairwise sync key
// from device linking, padded to 1024) and Sealed-Sender-addressed to the user's
// OWN px_id. No Double Ratchet - the two devices share the link key, not a
// ratchet. The server routes it like any message; it cannot tell self from peer.
message DeviceSync {
  bytes to_device   = 1; // target device_id (16 bytes)
  bytes from_device = 2; // origin device_id (selects the pairwise key)
  bytes blob        = 3; // AES-256-GCM(sync_key, padded payload)
}

// The payload that Sealed Sender wraps: the opaque Double Ratchet header +
// ciphertext, plus the PQXDH handshake on a new session's first message. The
// ratchet header is wasm-internal (bincode) and treated as opaque bytes here.
// Exactly one of (ratchet fields | device_sync) is meaningful per message.
message MessageEnvelope {
  bytes ratchet_header     = 1;
  bytes ratchet_ciphertext = 2;
  optional PqxdhInit pqxdh  = 3;
  optional DeviceSync device_sync = 4;
}
